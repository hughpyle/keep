embedding:
  # Default text embedding models used when keep selects a provider and the
  # user has not set `embedding.model` in keep.toml.
  voyage:
    model: voyage-3.5-lite
  openai:
    model: text-embedding-3-small
  gemini:
    model: text-embedding-004
  mistral:
    model: mistral-embed
  openrouter:
    model: openai/text-embedding-3-small
  ollama:
    model: nomic-embed-text
  mlx:
    model: all-MiniLM-L6-v2
  sentence-transformers:
    model: all-MiniLM-L6-v2

summarization:
  # Default summarization and analysis models used when the user has not set
  # `summarization.model` in keep.toml.
  anthropic:
    model: claude-haiku-4-5-20251001
  openai:
    model: gpt-4.1-mini
  gemini:
    model: gemini-2.5-flash
  mistral:
    model: mistral-small-latest
  openrouter:
    model: openai/gpt-4.1-mini
  ollama:
    model: llama3.2
  mlx:
    model: mlx-community/Llama-3.2-3B-Instruct-4bit

media:
  # Default media-description models. Ollama's configured default is the model
  # keep pulls when no local vision model is installed.
  ollama:
    model: gemma3:4b
  mlx:
    vision_model: mlx-community/Qwen2-VL-2B-Instruct-4bit
    whisper_model: mlx-community/whisper-large-v3-turbo

content_extractor:
  # Default OCR and document-extraction models.
  ollama:
    model: glm-ocr
  mlx:
    model: mlx-community/GLM-OCR-bf16
  mistral:
    model: mistral-ocr-latest
